name: Verificar PHP

on:
  push:
    branches: [ main ]

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Checar sintaxe dos arquivos PHP
        run: find . -name "*.php" -exec php -l {} \;
